<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — MyFarm</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body {
    min-height:100vh; display:flex; justify-content:center; align-items:center;
    background:#0A1220; padding:20px;
}
.register-container {
    width:420px; padding:35px; background:#00040D;
    border-radius:18px; border:2px solid #1E293B;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
h2 { text-align:center; color:#E5E7EB; margin-bottom:6px; }
.subtitle { text-align:center; color:#7e9bb8; font-size:.82rem; margin-bottom:22px; }
.input-group { margin-bottom:16px; }
.input-group label { display:block; margin-bottom:6px; font-weight:bold; color:#CBD5E1; }
.input-group input {
    width:100%; padding:12px; border:2px solid #334155;
    border-radius:8px; background:#111827; color:#E5E7EB; font-size:16px;
}
.input-group input:focus { outline:none; border-color:#3B82F6; }
.input-group input.invalid { border-color:#EF4444; }
.hint { font-size:.72rem; color:#7e9bb8; margin-top:5px; }
.btn { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px;
       cursor:pointer; font-size:16px; font-weight:bold; transition:.3s; }
.register-btn { background:#1E3A5F; color:white; }
.register-btn:hover { background:#294F80; }
.register-btn:disabled { background:#1a2e47; cursor:not-allowed; opacity:.7; }
.back-btn { background:#374151; color:white; }
.back-btn:hover { background:#4B5563; }
.message { margin-top:15px; text-align:center; font-weight:bold; }
.success { color:#22C55E; }
.error   { color:#EF4444; }
</style>
</head>
<body>

<div class="register-container">
    <img src="logo-full.png" alt="MyFarm" style="display:block;width:150px;margin:0 auto 22px;">
    <h2>Create Account</h2>
    <p class="subtitle">You'll need your Farm ID and Employee Code from your Admin.</p>

    <form id="registerForm">

        <div class="input-group">
            <label for="farm_id">Farm ID</label>
            <input type="number" id="farm_id" required min="1" placeholder="e.g. 1">
            <p class="hint">Your Admin can tell you this number.</p>
        </div>

        <div class="input-group">
            <label for="employee_code">Employee Code</label>
            <input type="text" id="employee_code" required
                   maxlength="8" placeholder="e.g. A3B9KZ"
                   autocomplete="off" style="text-transform:uppercase">
            <p class="hint">Provided by your Admin or IT Manager.</p>
        </div>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="new-password">
        </div>

        <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn register-btn" id="registerBtn">
            Create Account
        </button>
        <button type="button" class="btn back-btn"
                onclick="window.location.href='login.html'">
            Back to Login
        </button>

        <div id="message" class="message"></div>

    </form>
</div>

<script>
const form        = document.getElementById("registerForm");
const message     = document.getElementById("message");
const registerBtn = document.getElementById("registerBtn");

document.getElementById("employee_code").addEventListener("input", function() {
    this.value = this.value.toUpperCase();
    this.classList.remove("invalid");
});

form.querySelectorAll("input").forEach(function(input) {
    input.addEventListener("input", function() { input.classList.remove("invalid"); });
});

form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const farmId        = document.getElementById("farm_id").value.trim();
    const employeeCode  = document.getElementById("employee_code").value.trim().toUpperCase();
    const username      = document.getElementById("username").value.trim();
    const password      = document.getElementById("password").value;
    const confirmPwd    = document.getElementById("confirmPassword").value;

    if (!farmId || !employeeCode) {
        message.textContent = "Farm ID and Employee Code are required.";
        message.className   = "message error";
        return;
    }
    if (password !== confirmPwd) {
        message.textContent = "Passwords do not match.";
        message.className   = "message error";
        document.getElementById("confirmPassword").classList.add("invalid");
        return;
    }
    if (password.length < 6) {
        message.textContent = "Password must be at least 6 characters.";
        message.className   = "message error";
        document.getElementById("password").classList.add("invalid");
        return;
    }
    if (username.length < 3 || !/^[a-zA-Z0-9]+$/.test(username)) {
        message.textContent = "Username must be at least 3 alphanumeric characters.";
        message.className   = "message error";
        document.getElementById("username").classList.add("invalid");
        return;
    }

    registerBtn.disabled    = true;
    registerBtn.textContent = "Creating account…";
    message.textContent     = "";
    message.className       = "message";

    try {
        const res  = await fetch("/api/register/account", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({
                farm_id:       parseInt(farmId),
                employee_code: employeeCode,
                username,
                password,
            }),
        });
        const data = await res.json();

        if (data.success) {
            // Auto-login immediately — same reasoning as register_farm.html:
            // avoids any stale-session mixup with a previous farm.
            localStorage.setItem("farmName",     data.farm_name);
            localStorage.setItem("farmId",        data.farm_id);
            localStorage.setItem("userName",      data.username);
            localStorage.setItem("userId",        data.user_id);
            localStorage.setItem("userRole",      data.role);
            localStorage.setItem("userRoleLabel", data.role_label);

            message.textContent = data.message + " Taking you to your dashboard…";
            message.className   = "message success";
            setTimeout(function() { window.location.href = "dashboard.html"; }, 1000);
        } else {
            message.textContent = data.message;
            message.className   = "message error";
            registerBtn.disabled    = false;
            registerBtn.textContent = "Create Account";
        }
    } catch (err) {
        message.textContent     = "Could not reach the server. Is it running?";
        message.className       = "message error";
        registerBtn.disabled    = false;
        registerBtn.textContent = "Create Account";
    }
});
</script>

</body>
</html>
