<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFarm Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body {
    min-height:100vh; display:flex;
    justify-content:center; align-items:center;
    background:#0A1220;
}
.login-container {
    width:380px; padding:35px;
    background:#00040D; border-radius:18px;
    border:2px solid #1E293B;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}
h2 { text-align:center; color:#E5E7EB; margin-bottom:25px; }
.input-group { margin-bottom:18px; }
.input-group label { display:block; margin-bottom:6px; font-weight:bold; color:#CBD5E1; }
.input-group input {
    width:100%; padding:12px;
    border:2px solid #334155; border-radius:8px;
    background:#111827; color:#E5E7EB; font-size:16px;
}
.input-group input:focus { outline:none; border-color:#3B82F6; }
.btn {
    width:100%; padding:12px; margin-top:10px;
    border:none; border-radius:8px; cursor:pointer;
    font-size:16px; font-weight:bold; transition:.3s;
}
.login-btn  { background:#1E3A5F; color:white; }
.login-btn:hover  { background:#294F80; }
.login-btn:disabled { background:#1a2e47; cursor:not-allowed; opacity:.7; }
.create-btn { background:#374151; color:white; }
.create-btn:hover { background:#4B5563; }
.message { margin-top:15px; text-align:center; font-weight:bold; }
.success { color:#22C55E; }
.error   { color:#EF4444; }
</style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn login-btn" id="loginBtn">Sign In</button>

        <button type="button" class="btn create-btn"
                onclick="window.location.href='register_account.html'">
            Create Your Account
        </button>

        <button type="button" class="btn create-btn"
                onclick="window.location.href='register_farm.html'">
            Create Your Farm
        </button>

        <div id="message" class="message"></div>
    </form>
</div>

<script>
/*
  ── HOW LOCALSTORAGE IS POPULATED ───────────────────────────────────
  The /api/login endpoint returns:
    { success, farm_name, farm_id, username, user_id, role, role_label }
  On success we store ALL of these, since every other page depends on
  farmId/userRole (integer) being present — not just farmName.
  ─────────────────────────────────────────────────────────────────── */

const loginForm = document.getElementById("loginForm");
const message   = document.getElementById("message");
const loginBtn  = document.getElementById("loginBtn");

loginForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    loginBtn.disabled    = true;
    loginBtn.textContent = "Signing in…";
    message.textContent  = "";
    message.className    = "message";

    try {
        const res  = await fetch("/api/login", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.success) {
            localStorage.setItem("farmName",     data.farm_name);
            localStorage.setItem("farmId",        data.farm_id);
            localStorage.setItem("userName",      data.username);
            localStorage.setItem("userId",        data.user_id);
            localStorage.setItem("userRole",      data.role);        // integer
            localStorage.setItem("userRoleLabel", data.role_label);  // "Admin" etc.

            message.textContent = data.message;
            message.className   = "message success";

            setTimeout(function () {
                window.location.href = "dashboard.html";
            }, 800);

        } else {
            message.textContent  = data.message;
            message.className    = "message error";
            loginBtn.disabled    = false;
            loginBtn.textContent = "Sign In";
        }

    } catch (err) {
        message.textContent  = "Could not reach the server. Is it running?";
        message.className    = "message error";
        loginBtn.disabled    = false;
        loginBtn.textContent = "Sign In";
    }
});
</script>

</body>
</html>
