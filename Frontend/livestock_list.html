<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Livestock — MyFarm</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">

<style>
/* ══ List-page-only styles ══════════════════════════════════ */
.back-link {
    display:inline-flex; align-items:center; gap:6px;
    color:var(--muted); font-size:.82rem; font-weight:500;
    cursor:pointer; margin-bottom:2px; width:fit-content;
}
.back-link:hover { color:var(--accent); }
.back-link svg { width:14px; height:14px; stroke:currentColor; fill:none;
                  stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* Filter bar */
.filter-bar {
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px;
}
.filter-field { display:flex; flex-direction:column; gap:5px; }
.filter-field label { font-size:.7rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
.filter-field input, .filter-field select {
    background:var(--input); border:1px solid var(--border); border-radius:8px;
    padding:8px 10px; color:var(--text); font-size:.82rem; font-family:'Inter',sans-serif;
    min-width:130px;
}
.filter-field input:focus, .filter-field select:focus { outline:none; border-color:var(--accent); }
.filter-clear {
    align-self:flex-end; background:var(--input); border:1px solid var(--border);
    border-radius:8px; padding:8px 14px; color:var(--muted); font-size:.8rem;
    font-weight:600; cursor:pointer; transition:.2s;
}
.filter-clear:hover { color:var(--text); border-color:var(--muted); }
.result-count { font-size:.78rem; color:var(--muted); margin-left:auto; align-self:flex-end; padding-bottom:9px; }

/* Table */
.table-wrap { overflow-x:auto; }
table.animals-table { width:100%; border-collapse:collapse; font-size:.85rem; }
.animals-table th {
    text-align:left; padding:10px 14px; color:var(--muted);
    font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600;
    border-bottom:1px solid var(--border); cursor:pointer; white-space:nowrap;
    user-select:none;
}
.animals-table th:hover { color:var(--text); }
.animals-table th.sorted::after { content:' ▾'; color:var(--accent); }
.animals-table th.actions-col { cursor:default; }
.animals-table th.actions-col:hover { color:var(--muted); }
.animals-table td {
    padding:11px 14px; border-bottom:1px solid rgba(42,58,77,.4); white-space:nowrap;
}
.animals-table tr:last-child td { border-bottom:none; }
.animals-table tr:hover td { background:rgba(255,255,255,.015); }
.tag-pill {
    display:inline-block; background:var(--accent-dim); color:var(--accent);
    font-weight:700; font-size:.78rem; padding:3px 9px; border-radius:6px;
}
.gender-pill { font-size:.78rem; padding:3px 9px; border-radius:6px; font-weight:600; }
.gender-pill.Male   { background:var(--blue-dim);  color:var(--blue); }
.gender-pill.Female { background:rgba(244,114,182,.12); color:#f472b6; }
.notes-cell { color:var(--muted); max-width:220px; overflow:hidden; text-overflow:ellipsis;
              white-space:nowrap; font-size:.8rem; }

/* Row actions */
.actions-cell { display:flex; gap:6px; }
.icon-btn {
    width:30px; height:30px; border-radius:8px; border:1px solid var(--border);
    background:var(--input); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.2s; flex-shrink:0;
}
.icon-btn svg { width:14px; height:14px; stroke:var(--muted); fill:none;
                stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:.2s; }
.icon-btn:hover { border-color:var(--accent); }
.icon-btn:hover svg { stroke:var(--accent); }
.icon-btn.danger-btn:hover { border-color:var(--danger); }
.icon-btn.danger-btn:hover svg { stroke:var(--danger); }

/* Pagination */
.pagination { display:flex; align-items:center; justify-content:center; gap:8px; padding-top:6px; }
.page-btn {
    background:var(--input); border:1px solid var(--border); border-radius:8px;
    padding:7px 13px; color:var(--text); font-size:.8rem; font-weight:600;
    cursor:pointer; transition:.2s;
}
.page-btn:hover:not(:disabled) { border-color:var(--accent); }
.page-btn:disabled { opacity:.35; cursor:not-allowed; }
.page-info { font-size:.78rem; color:var(--muted); padding:0 6px; }

/* ══ Modals (Edit / Delete) ══════════════════════════════════ */
.modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.6);
    display:none; align-items:center; justify-content:center; z-index:400;
}
.modal-overlay.open { display:flex; }
.modal-box {
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    padding:26px; width:440px; max-width:92vw;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    max-height:88vh; overflow-y:auto;
}
.modal-box.small { width:380px; }
.modal-title { font-size:1.05rem; font-weight:700; margin-bottom:18px; }
.modal-field { margin-bottom:16px; }
.modal-field label { display:block; margin-bottom:6px; font-size:.82rem; font-weight:600; }
.modal-field input, .modal-field select, .modal-field textarea {
    width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:9px;
    background:var(--input); color:var(--text); font-size:.88rem; font-family:'Inter',sans-serif;
}
.modal-field textarea { resize:vertical; min-height:64px; }
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { outline:none; border-color:var(--accent); }
.modal-field input.invalid, .modal-field select.invalid { border-color:var(--danger); }
.modal-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-gender-toggle { display:flex; gap:10px; }
.modal-gender-opt {
    flex:1; text-align:center; padding:10px; border:1.5px solid var(--border);
    border-radius:9px; cursor:pointer; font-weight:600; font-size:.85rem;
    color:var(--muted); transition:.2s; background:var(--input);
}
.modal-gender-opt.selected.Male   { border-color:var(--blue); color:var(--blue); background:var(--blue-dim); }
.modal-gender-opt.selected.Female { border-color:#f472b6; color:#f472b6; background:rgba(244,114,182,.12); }
.modal-actions { display:flex; gap:10px; margin-top:6px; }
.modal-btn { flex:1; padding:11px; border:none; border-radius:9px; cursor:pointer;
             font-size:.86rem; font-weight:700; font-family:'Inter',sans-serif; transition:.2s; }
.modal-btn.primary { background:linear-gradient(135deg,var(--accent),#22b060); color:#06130a; }
.modal-btn.primary:hover { transform:translateY(-1px); }
.modal-btn.primary:disabled { opacity:.6; cursor:not-allowed; transform:none; }
.modal-btn.danger { background:linear-gradient(135deg,var(--danger),#c73f3f); color:#1a0505; }
.modal-btn.danger:hover { transform:translateY(-1px); }
.modal-btn.danger:disabled { opacity:.6; cursor:not-allowed; transform:none; }
.modal-btn.secondary { background:var(--input); color:var(--text); border:1px solid var(--border); }
.modal-btn.secondary:hover { border-color:var(--muted); }
.modal-message { margin-top:12px; font-size:.82rem; font-weight:600; display:none; }
.modal-message.error { display:block; color:var(--danger); }
.modal-message.success { display:block; color:var(--accent); }
.delete-warning { font-size:.85rem; color:var(--muted); line-height:1.5; margin-bottom:20px; }
.delete-warning strong { color:var(--text); }
</style>
</head>
<body>

<div class="dashboard-layout">
<div id="sidebar-mount"></div>

    <div class="main">
        <div id="topbar-mount"></div>

        <div class="content">

            <span class="back-link" onclick="window.location.href='livestock.html'">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                Back to Livestock
            </span>

            <div class="banner error" id="api-error">
                ⚠ Could not reach the server. Is app.py running?
            </div>

            <!-- ── Filters ─────────────────────────────────── -->
            <div class="filter-bar">
                <div class="filter-field">
                    <label for="f-tag">Tag Number</label>
                    <input type="text" id="f-tag" placeholder="Search tag…">
                </div>
                <div class="filter-field">
                    <label for="f-breed">Breed</label>
                    <select id="f-breed"><option value="">All breeds</option></select>
                </div>
                <div class="filter-field">
                    <label for="f-herd">Herd</label>
                    <select id="f-herd"><option value="">All herds</option></select>
                </div>
                <div class="filter-field">
                    <label for="f-gender">Gender</label>
                    <select id="f-gender">
                        <option value="">All</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="f-sort">Sort By</label>
                    <select id="f-sort">
                        <option value="tag_number">Tag Number</option>
                        <option value="dob">Age</option>
                        <option value="weight">Weight</option>
                        <option value="herd">Herd</option>
                        <option value="gender">Gender</option>
                        <option value="breed">Breed</option>
                    </select>
                </div>
                <button class="filter-clear" onclick="clearFilters()">Clear Filters</button>
                <span class="result-count" id="result-count"></span>
            </div>

            <!-- ── Table ───────────────────────────────────── -->
            <div class="panel" style="padding:0;overflow:hidden;">
                <div class="table-wrap">
                    <table class="animals-table">
                        <thead>
                            <tr>
                                <th>Tag</th>
                                <th>Gender</th>
                                <th>Breed</th>
                                <th>Age</th>
                                <th>Date of Birth</th>
                                <th>Weight</th>
                                <th>Herd</th>
                                <th>Notes</th>
                                <th class="actions-col">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="animals-tbody">
                            <tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px;">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>

        </div>
    </div>
</div>

<button class="fab" title="Add livestock" onclick="window.location.href='add_livestock.html'">+</button>

<!-- ══ Edit Animal modal ══════════════════════════════════════ -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal-box">
        <div class="modal-title">Edit Animal</div>
        <form id="editForm">
            <input type="hidden" id="edit_id">

            <div class="modal-field">
                <label for="edit_tag_number">Tag Number</label>
                <input type="text" id="edit_tag_number" required>
            </div>

            <div class="modal-field">
                <label>Gender</label>
                <input type="hidden" id="edit_gender" value="">
                <div class="modal-gender-toggle">
                    <div class="modal-gender-opt Male"   data-gender="Male"   onclick="selectEditGender('Male')">Male</div>
                    <div class="modal-gender-opt Female" data-gender="Female" onclick="selectEditGender('Female')">Female</div>
                </div>
            </div>

            <div class="modal-field">
                <label for="edit_breed">Breed <span style="color:var(--muted);font-weight:400;">— optional</span></label>
                <select id="edit_breed">
                    <option value="">— None —</option>
                </select>
            </div>

            <div class="modal-row-2">
                <div class="modal-field">
                    <label for="edit_date_of_birth">Date of Birth</label>
                    <input type="date" id="edit_date_of_birth" required>
                </div>
                <div class="modal-field">
                    <label for="edit_weight">Weight (lb) <span style="color:var(--muted);font-weight:400;">— optional</span></label>
                    <input type="number" id="edit_weight" min="0" step="0.1">
                </div>
            </div>

            <div class="modal-field">
                <label for="edit_herd_id">Herd</label>
                <select id="edit_herd_id">
                    <option value="">— Unassigned —</option>
                </select>
            </div>

            <div class="modal-field">
                <label for="edit_notes">Notes <span style="color:var(--muted);font-weight:400;">— optional</span></label>
                <textarea id="edit_notes"></textarea>
            </div>

            <div class="modal-actions">
                <button type="button" class="modal-btn secondary" onclick="closeEditModal()">Cancel</button>
                <button type="submit" class="modal-btn primary" id="edit-submit-btn">Save Changes</button>
            </div>
            <div class="modal-message" id="edit-modal-message"></div>
        </form>
    </div>
</div>

<!-- ══ Delete Confirmation modal ══════════════════════════════ -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal-box small">
        <div class="modal-title">Delete Animal</div>
        <p class="delete-warning">
            Are you sure you want to delete <strong id="delete-tag-label">this animal</strong>?
            This will remove its record and update herd counts. This cannot be undone.
        </p>
        <div class="modal-actions">
            <button type="button" class="modal-btn secondary" onclick="closeDeleteModal()">Cancel</button>
            <button type="button" class="modal-btn danger" id="delete-confirm-btn" onclick="confirmDelete()">Delete</button>
        </div>
        <div class="modal-message" id="delete-modal-message"></div>
    </div>
</div>

<script src="shared.js"></script>
<script>
initLayout('livestock', {
    title:    'All Livestock',
    subtitle: 'Browse, search, and filter every registered animal.',
});

var PAGE_SIZE   = 25;
var currentPage = 0;
var totalCount  = 0;

/* Cache of the animals currently shown in the table, keyed by id,
   so Edit can prefill its form without an extra round trip. */
var animalsById = {};

/* Pre-select filters from URL params (clicked from a herd or breed card) */
var urlParams = new URLSearchParams(window.location.search);
var presetHerd  = urlParams.get('herd');
var presetBreed = urlParams.get('breed');

async function loadHerdOptions() {
    try {
        var res  = await fetch('/api/herds?farm_name=' + encodeURIComponent(FARM_NAME));
        var data = await res.json();
        var herds = data.herds || [];

        var filterSel = document.getElementById('f-herd');
        var editSel   = document.getElementById('edit_herd_id');

        herds.forEach(function(h) {
            var opt1 = document.createElement('option');
            opt1.value = h.id; opt1.textContent = h.herd_name;
            filterSel.appendChild(opt1);

            var opt2 = document.createElement('option');
            opt2.value = h.id; opt2.textContent = h.herd_name;
            editSel.appendChild(opt2);
        });

        if (presetHerd) filterSel.value = presetHerd;
    } catch (err) {
        console.warn('Could not load herd list for filter:', err);
    }
}

async function loadBreedOptions() {
    try {
        var res  = await fetch('/api/breeds?farm_name=' + encodeURIComponent(FARM_NAME));
        var data = await res.json();
        var breeds = data.breeds || [];

        var filterSel = document.getElementById('f-breed');
        var editSel   = document.getElementById('edit_breed');

        breeds.forEach(function(b) {
            var opt1 = document.createElement('option');
            opt1.value = b.breed_name; opt1.textContent = b.breed_name;
            filterSel.appendChild(opt1);

            var opt2 = document.createElement('option');
            opt2.value = b.breed_name; opt2.textContent = b.breed_name;
            editSel.appendChild(opt2);
        });

        if (presetBreed) filterSel.value = presetBreed;
    } catch (err) {
        console.warn('Could not load breed list for filter:', err);
    }
}

function genderPillHtml(g) {
    return '<span class="gender-pill ' + g + '">' + g + '</span>';
}

var EDIT_ICON   = '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
var DELETE_ICON = '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';

function renderRows(animals) {
    var tbody = document.getElementById('animals-tbody');
    animalsById = {};

    if (!animals || animals.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px;">No animals match these filters.</td></tr>';
        return;
    }

    animals.forEach(function(a) { animalsById[a.id] = a; });

    tbody.innerHTML = animals.map(function(a) {
        return [
            '<tr>',
            '  <td><span class="tag-pill">#', escHtml(a.tag_number), '</span></td>',
            '  <td>', genderPillHtml(a.gender), '</td>',
            '  <td>', escHtml(a.breed), '</td>',
            '  <td>', escHtml(a.age), '</td>',
            '  <td>', escHtml(a.date_of_birth || '—'), '</td>',
            '  <td>', a.weight != null ? a.weight + ' lb' : '—', '</td>',
            '  <td>', escHtml(a.herd_name), '</td>',
            '  <td class="notes-cell" title="', escHtml(a.notes), '">', escHtml(a.notes) || '—', '</td>',
            '  <td>',
            '    <div class="actions-cell">',
            '      <button type="button" class="icon-btn" title="Edit" onclick="openEditModal(', a.id, ')">', EDIT_ICON, '</button>',
            '      <button type="button" class="icon-btn danger-btn" title="Delete" onclick="openDeleteModal(', a.id, ')">', DELETE_ICON, '</button>',
            '    </div>',
            '  </td>',
            '</tr>',
        ].join('');
    }).join('');
}

function renderPagination() {
    var pag = document.getElementById('pagination');
    var totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    pag.innerHTML =
        '<button class="page-btn" id="prev-btn" ' + (currentPage === 0 ? 'disabled' : '') + '>← Prev</button>' +
        '<span class="page-info">Page ' + (currentPage + 1) + ' of ' + totalPages + '</span>' +
        '<button class="page-btn" id="next-btn" ' + (currentPage >= totalPages - 1 ? 'disabled' : '') + '>Next →</button>';

    document.getElementById('prev-btn').onclick = function() { currentPage--; loadAnimals(); };
    document.getElementById('next-btn').onclick = function() { currentPage++; loadAnimals(); };
}

var sortedCol = 'tag_number';

async function loadAnimals() {
    var params = new URLSearchParams();
    params.set('farm_name', FARM_NAME);
    params.set('limit',  PAGE_SIZE);
    params.set('offset', currentPage * PAGE_SIZE);
    params.set('sort',   document.getElementById('f-sort').value);

    var tag    = document.getElementById('f-tag').value.trim();
    var breed  = document.getElementById('f-breed').value.trim();
    var herd   = document.getElementById('f-herd').value;
    var gender = document.getElementById('f-gender').value;
    if (tag)    params.set('tag', tag);
    if (breed)  params.set('breed', breed);
    if (herd)   params.set('herd_id', herd);
    if (gender) params.set('gender', gender);

    try {
        var res  = await fetch('/api/animals?' + params.toString());
        var data = await res.json();
        totalCount = data.total || 0;

        document.getElementById('result-count').textContent =
            totalCount + ' animal' + (totalCount !== 1 ? 's' : '') + ' found';

        renderRows(data.animals);
        renderPagination();
        document.getElementById('api-error').style.display = 'none';

    } catch (err) {
        document.getElementById('api-error').style.display = 'block';
        console.warn('API unreachable:', err);
        renderRows([]);
        document.getElementById('result-count').textContent = '0 animals found';
    }
}

/* Re-fetch on any filter change, reset to page 0 */
['f-tag','f-breed','f-herd','f-gender','f-sort'].forEach(function(id) {
    var el = document.getElementById(id);
    var evt = (el.tagName === 'SELECT') ? 'change' : 'input';
    var debounce;
    el.addEventListener(evt, function() {
        clearTimeout(debounce);
        debounce = setTimeout(function() {
            currentPage = 0;
            loadAnimals();
        }, evt === 'input' ? 300 : 0);
    });
});

function clearFilters() {
    document.getElementById('f-tag').value    = '';
    document.getElementById('f-breed').value  = '';
    document.getElementById('f-herd').value   = '';
    document.getElementById('f-gender').value = '';
    document.getElementById('f-sort').value   = 'tag_number';
    currentPage = 0;
    loadAnimals();
}

/* ══════════════════════════════════════════════════════════════
   EDIT MODAL
════════════════════════════════════════════════════════════════ */
function selectEditGender(g) {
    document.getElementById('edit_gender').value = g;
    document.querySelectorAll('#editForm .modal-gender-opt').forEach(function(el) {
        el.classList.toggle('selected', el.dataset.gender === g);
    });
}

function openEditModal(id) {
    var a = animalsById[id];
    if (!a) return;

    document.getElementById('edit_id').value           = a.id;
    document.getElementById('edit_tag_number').value    = a.tag_number;
    document.getElementById('edit_date_of_birth').value = a.date_of_birth || '';
    document.getElementById('edit_weight').value        = a.weight != null ? a.weight : '';
    document.getElementById('edit_notes').value         = a.notes || '';
    document.getElementById('edit_breed').value         = (a.breed && a.breed !== '—') ? a.breed : '';
    document.getElementById('edit_herd_id').value       = a.herd_id || '';

    selectEditGender(a.gender);

    document.getElementById('edit_tag_number').classList.remove('invalid');
    document.getElementById('edit-modal-message').style.display = 'none';

    var btn = document.getElementById('edit-submit-btn');
    btn.disabled = false;
    btn.textContent = 'Save Changes';

    document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('open');
}
document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
});

document.getElementById('editForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    var id     = document.getElementById('edit_id').value;
    var tag    = document.getElementById('edit_tag_number').value.trim();
    var gender = document.getElementById('edit_gender').value;
    var breed  = document.getElementById('edit_breed').value.trim();
    var dob    = document.getElementById('edit_date_of_birth').value;
    var weight = document.getElementById('edit_weight').value;
    var herdId = document.getElementById('edit_herd_id').value;
    var notes  = document.getElementById('edit_notes').value.trim();

    var msg = document.getElementById('edit-modal-message');
    var btn = document.getElementById('edit-submit-btn');

    msg.style.display = 'none';
    document.getElementById('edit_tag_number').classList.remove('invalid');

    if (!tag) {
        msg.textContent = 'Tag number is required.';
        msg.className = 'modal-message error';
        document.getElementById('edit_tag_number').classList.add('invalid');
        return;
    }
    if (!gender) {
        msg.textContent = 'Please select a gender.';
        msg.className = 'modal-message error';
        return;
    }
    if (!dob) {
        msg.textContent = 'Date of birth is required.';
        msg.className = 'modal-message error';
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Saving…';

    try {
        var res = await fetch('/api/animals/' + id, {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                farm_name:      FARM_NAME,
                tag_number:     tag,
                gender:         gender,
                breed:          breed,
                date_of_birth:  dob,
                weight:         weight ? parseFloat(weight) : null,
                herd_id:        herdId ? parseInt(herdId) : null,
                notes:          notes,
            }),
        });
        var data = await res.json();

        if (data.success) {
            msg.textContent = data.message;
            msg.className   = 'modal-message success';
            setTimeout(function() {
                closeEditModal();
                loadAnimals();
            }, 600);
        } else {
            msg.textContent = data.message;
            msg.className   = 'modal-message error';
            btn.disabled    = false;
            btn.textContent = 'Save Changes';
        }
    } catch (err) {
        msg.textContent = 'Could not reach the server. Is it running?';
        msg.className   = 'modal-message error';
        btn.disabled    = false;
        btn.textContent = 'Save Changes';
    }
});

/* ══════════════════════════════════════════════════════════════
   DELETE MODAL
════════════════════════════════════════════════════════════════ */
var pendingDeleteId = null;

function openDeleteModal(id) {
    var a = animalsById[id];
    if (!a) return;

    pendingDeleteId = id;
    document.getElementById('delete-tag-label').textContent = '#' + a.tag_number;
    document.getElementById('delete-modal-message').style.display = 'none';

    var btn = document.getElementById('delete-confirm-btn');
    btn.disabled = false;
    btn.textContent = 'Delete';

    document.getElementById('delete-modal').classList.add('open');
}

function closeDeleteModal() {
    document.getElementById('delete-modal').classList.remove('open');
    pendingDeleteId = null;
}
document.getElementById('delete-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteModal();
});

async function confirmDelete() {
    if (!pendingDeleteId) return;

    var msg = document.getElementById('delete-modal-message');
    var btn = document.getElementById('delete-confirm-btn');
    msg.style.display = 'none';
    btn.disabled    = true;
    btn.textContent = 'Deleting…';

    try {
        var res = await fetch(
            '/api/animals/' + pendingDeleteId + '?farm_name=' + encodeURIComponent(FARM_NAME),
            { method: 'DELETE' }
        );
        var data = await res.json();

        if (data.success) {
            msg.textContent = data.message;
            msg.className   = 'modal-message success';
            setTimeout(function() {
                closeDeleteModal();
                /* If we deleted the last row on this page, step back a page */
                if (animalsById && Object.keys(animalsById).length === 1 && currentPage > 0) {
                    currentPage--;
                }
                loadAnimals();
            }, 500);
        } else {
            msg.textContent = data.message;
            msg.className   = 'modal-message error';
            btn.disabled    = false;
            btn.textContent = 'Delete';
        }
    } catch (err) {
        msg.textContent = 'Could not reach the server. Is it running?';
        msg.className   = 'modal-message error';
        btn.disabled    = false;
        btn.textContent = 'Delete';
    }
}

(async function init() {
    await Promise.all([loadHerdOptions(), loadBreedOptions()]);
    loadAnimals();
})();
</script>
